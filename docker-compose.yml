services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: playbook_backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - ./backend/credentials:/app/credentials:ro
      - ./backend/access.json:/app/access.json:ro
      - ./data:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001/api
    container_name: playbook_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped


