name: CI/CD Pipeline

on:
  push:
    branches: feature/active_directory
  pull_request:
    branches: feature/active_directory
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.11' }}
  NODE_VERSION: ${{ vars.NODE_VERSION || '20.x' }}
  PROJECT_PATH: ${{ vars.PROJECT_PATH }}
  BACKEND_CONTAINER: playbook_backend
  FRONTEND_CONTAINER: playbook_frontend
  HEALTH_CHECK_TIMEOUT: ${{ vars.HEALTH_CHECK_TIMEOUT || '90' }}
  HEALTH_CHECK_INTERVAL: ${{ vars.HEALTH_CHECK_INTERVAL || '5' }}

jobs:
  backend:
    name: "Backend · Lint & Test"
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --statistics

      - name: Run tests
        run: |
          if (Test-Path "test_*.py") {
            pip install pytest
            pytest -v
          } else {
            Write-Output "No test files found. Skipping."
          }

  frontend:
    name: "Frontend · Lint & Build"
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: node-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          if ($pkg.scripts.test) { npm test } else { Write-Output "No test script defined. Skipping." }

  deploy:
    name: "Deploy · Docker Compose"
    runs-on: self-hosted
    needs: [backend, frontend]
    timeout-minutes: 15
    if: github.event_name != 'pull_request'

    env:
      AD_BIND_USER: ${{ secrets.AD_BIND_USER }}
      AD_BIND_PASSWORD: ${{ secrets.AD_BIND_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          $missing = @()
          if ([string]::IsNullOrEmpty($env:AD_BIND_USER))    { $missing += "AD_BIND_USER" }
          if ([string]::IsNullOrEmpty($env:AD_BIND_PASSWORD)) { $missing += "AD_BIND_PASSWORD" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing GitHub Secrets: $($missing -join ', '). Set them in Settings > Secrets > Actions."
            exit 1
          }
          Write-Output "All required secrets are present."

      - name: Generate .env from secrets and config
        run: |
          $envPath = Join-Path "${{ env.PROJECT_PATH }}" ".env"
          $content = @"
          APP_ENV=production
          LOG_LEVEL=INFO
          DATA_DIR=/data
          ENABLE_CHAT=true
          ENABLE_RELOAD=false
          ENABLE_DEBUG_ENDPOINTS=false
          ENABLE_META_ENDPOINT=true
          ENABLE_ACCESS_CONTROL=true
          MAINTENANCE_MODE=false
          MAINTENANCE_MESSAGE=The playbook is currently under maintenance. Please try again shortly.
          AD_SERVER=${{ vars.AD_SERVER || 'samba-ad.ad.one-nds.net' }}
          AD_BASE_DN=${{ vars.AD_BASE_DN || 'DC=ad,DC=one-nds,DC=net' }}
          AD_BIND_USER=${{ secrets.AD_BIND_USER }}
          AD_BIND_PASSWORD=${{ secrets.AD_BIND_PASSWORD }}
          "@
          $content -replace '(?m)^\s+', '' | Set-Content -Path $envPath -Encoding UTF8 -Force
          Write-Output ".env generated at $envPath"

      - name: Stop existing containers
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          docker-compose down --remove-orphans 2>$null
          Write-Output "Old containers removed."

      - name: Build and start services
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          docker-compose up --build -d
          if ($LASTEXITCODE -ne 0) { Write-Error "docker-compose up failed"; exit 1 }
          Write-Output "Services started."

      - name: Wait for backend health check
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          $timeout  = [int]$env:HEALTH_CHECK_TIMEOUT
          $interval = [int]$env:HEALTH_CHECK_INTERVAL
          $elapsed  = 0

          Write-Output "Waiting up to ${timeout}s for ${{ env.BACKEND_CONTAINER }}..."

          while ($elapsed -lt $timeout) {
            $status = docker inspect --format="{{.State.Health.Status}}" ${{ env.BACKEND_CONTAINER }} 2>$null

            switch ($status) {
              "healthy" {
                Write-Output "Backend healthy after ${elapsed}s."
                exit 0
              }
              "unhealthy" {
                Write-Error "Backend unhealthy."
                docker logs --tail 50 ${{ env.BACKEND_CONTAINER }}
                exit 1
              }
            }

            Write-Output "  [${elapsed}s] status=$status"
            Start-Sleep -Seconds $interval
            $elapsed += $interval
          }

          Write-Error "Health-check timed out after ${timeout}s."
          docker logs --tail 50 ${{ env.BACKEND_CONTAINER }}
          exit 1

      - name: Smoke test API
        run: |
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:8001/" -UseBasicParsing -TimeoutSec 10
            Write-Output "Smoke test passed (HTTP $($response.StatusCode))."
          } catch {
            Write-Error "Smoke test failed: $_"
            exit 1
          }

      - name: Show running services
        if: always()
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          Write-Output "=== Container Status ==="
          docker-compose ps
          Write-Output ""
          Write-Output "=== Backend Logs (last 30 lines) ==="
          docker logs --tail 30 ${{ env.BACKEND_CONTAINER }}

      - name: Cleanup generated .env
        if: always()
        run: |
          $envPath = Join-Path "${{ env.PROJECT_PATH }}" ".env"
          if (Test-Path $envPath) {
            Remove-Item $envPath -Force
            Write-Output ".env removed from disk."
          }

  summary:
    name: "Summary"
    runs-on: self-hosted
    needs: [backend, frontend, deploy]
    if: always()

    steps:
      - name: Pipeline result
        run: |
          $be = "${{ needs.backend.result }}"
          $fe = "${{ needs.frontend.result }}"
          $dp = "${{ needs.deploy.result }}"

          Write-Output "=========================================="
          Write-Output "  CI/CD Pipeline Summary"
          Write-Output "=========================================="
          Write-Output "  Backend  : $be"
          Write-Output "  Frontend : $fe"
          Write-Output "  Deploy   : $dp"
          Write-Output "  Actor    : ${{ github.actor }}"
          Write-Output "  Branch   : ${{ github.ref_name }}"
          Write-Output "  Commit   : ${{ github.sha }}"
          Write-Output "=========================================="

          if ($dp -eq "success") {
            Write-Output "All jobs passed. Services are live!"
          } elseif ($dp -eq "skipped") {
            Write-Output "Deploy skipped (PR build-only mode)."
          } else {
            Write-Output "Pipeline failed. Review the logs above."
            exit 1
          }
