name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/active_directory
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint backend
        run: |
          pip install flake8
          flake8 .

      - name: Run backend tests
        run: Write-Output 'No backend tests defined. Skipping test step.'

  build-frontend:
    name: Build & Test Frontend
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: Write-Output 'No frontend tests defined.'

  deploy:
    name: Deploy Locally with Docker Compose
    needs: [build-backend, build-frontend]
    runs-on: self-hosted
    defaults:
      run:
        working-directory: C:\Users\nds-25217\Desktop\PlaybookChatbot
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify .env exists in project folder
        run: |
          $envPath = "C:\Users\nds-25217\Desktop\PlaybookChatbot\.env"
          if (-Not (Test-Path $envPath)) {
            Write-Output "ERROR: .env not found at $envPath"
            Write-Output "Please create the .env file in your project folder first."
            exit 1
          }
          Write-Output "✅ .env found at $envPath"
          Write-Output "--- .env contents (secrets masked) ---"
          Get-Content $envPath | ForEach-Object {
            if ($_ -match "^(AD_BIND_USER|AD_BIND_PASSWORD)=(.+)") {
              "$($Matches[1])=***"
            } else {
              $_
            }
          }

      - name: Copy local .env to workspace
        run: |
          $src = "C:\Users\nds-25217\Desktop\PlaybookChatbot\.env"
          $dst = "${{ github.workspace }}\.env"
          if ($src -ne $dst) {
            Copy-Item $src $dst -Force
            Write-Output "✅ .env copied to workspace"
          } else {
            Write-Output "✅ .env already in workspace"
          }

      - name: Stop existing containers
        working-directory: C:\Users\nds-25217\Desktop\PlaybookChatbot
        run: |
          docker-compose down --remove-orphans
          Write-Output "✅ Old containers stopped"

      - name: Build and start services
        working-directory: C:\Users\nds-25217\Desktop\PlaybookChatbot
        run: |
          docker-compose up --build -d
          if ($LASTEXITCODE -ne 0) {
            Write-Output "ERROR: docker-compose up failed"
            exit 1
          }
          Write-Output "✅ Docker Compose started"

      - name: Wait for backend health check
        working-directory: C:\Users\nds-25217\Desktop\PlaybookChatbot
        run: |
          Write-Output "Waiting for backend to become healthy..."
          $maxWait = 90
          $elapsed = 0
          $interval = 5
          while ($elapsed -lt $maxWait) {
            $status = docker inspect --format="{{.State.Health.Status}}" playbook_backend 2>$null
            Write-Output "[$elapsed s] Backend health: $status"
            if ($status -eq "healthy") {
              Write-Output "✅ Backend is healthy!"
              break
            }
            if ($status -eq "unhealthy") {
              Write-Output "❌ Backend is unhealthy. Dumping logs..."
              docker logs playbook_backend
              docker inspect --format="{{json .State.Health}}" playbook_backend
              exit 1
            }
            Start-Sleep -Seconds $interval
            $elapsed += $interval
          }
          if ($elapsed -ge $maxWait) {
            Write-Output "❌ Backend did not become healthy in ${maxWait}s. Dumping logs..."
            docker logs playbook_backend
            docker inspect --format="{{json .State.Health}}" playbook_backend
            exit 1
          }

      - name: Show running services
        working-directory: C:\Users\nds-25217\Desktop\PlaybookChatbot
        if: always()
        run: |
          Write-Output "=== Container Status ==="
          docker-compose ps
          Write-Output "=== Backend Logs (last 30 lines) ==="
          docker logs playbook_backend --tail 30

      - name: Cleanup copied .env from workspace
        if: always()
        run: |
          $dst = "${{ github.workspace }}\.env"
          $src = "C:\Users\nds-25217\Desktop\PlaybookChatbot\.env"
          if ($dst -ne $src -and (Test-Path $dst)) {
            Remove-Item $dst -Force
            Write-Output "✅ .env cleaned up from workspace"
          }

  summary:
    name: Workflow Summary
    needs: [build-backend, build-frontend, deploy]
    runs-on: self-hosted
    if: always()
    steps:
      - name: Print summary
        run: |
          Write-Output "=========================================="
          Write-Output "CI/CD Workflow Summary"
          Write-Output "=========================================="
          Write-Output "Backend Build : ${{ needs.build-backend.result }}"
          Write-Output "Frontend Build: ${{ needs.build-frontend.result }}"
          Write-Output "Deployment    : ${{ needs.deploy.result }}"
          Write-Output "=========================================="
          if ("${{ needs.deploy.result }}" -eq "success") {
            Write-Output "✅ All jobs passed. Services are running!"
          } else {
            Write-Output "❌ Deployment failed. Check the deploy job logs above."
            exit 1
          }
