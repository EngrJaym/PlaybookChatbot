name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/active_directory
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint backend
        run: |
          pip install flake8
          flake8 .

      - name: Run backend tests
        run: |
          echo 'No backend tests defined. Skipping test step.' || true

  build-frontend:
    name: Build & Test Frontend
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint || echo 'No lint script defined.'

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test || echo 'No frontend tests defined.'

  deploy:
    name: Deploy Locally with Docker Compose
    needs: [build-backend, build-frontend]
    runs-on: self-hosted
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          docker-compose down || echo "No containers to stop."
          docker-compose up --build -d

      - name: Notify success
        run: echo "Local deployment with Docker Compose completed!"

  summary:
    name: Workflow Summary
    needs: [build-backend, build-frontend, deploy]
    runs-on: self-hosted
    steps:
      - name: Print summary
        run: |
          echo "CI/CD workflow finished. Check previous job logs for details."
